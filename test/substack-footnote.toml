title = "America used to be exceptionally patriotic. Now we're below average."
body = '''
<figure><a href="https://substackcdn.com/image/fetch/$s_!_LbL!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank"><picture><source type="image/webp" srcset="https://substackcdn.com/image/fetch/$s_!_LbL!,w_424,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 424w, https://substackcdn.com/image/fetch/$s_!_LbL!,w_848,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 848w, https://substackcdn.com/image/fetch/$s_!_LbL!,w_1272,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 1272w, https://substackcdn.com/image/fetch/$s_!_LbL!,w_1456,c_limit,f_webp,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 1456w" sizes="100vw"/><img src="https://substackcdn.com/image/fetch/$s_!_LbL!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg" width="1456" height="971" alt="" srcset="https://substackcdn.com/image/fetch/$s_!_LbL!,w_424,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 424w, https://substackcdn.com/image/fetch/$s_!_LbL!,w_848,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 848w, https://substackcdn.com/image/fetch/$s_!_LbL!,w_1272,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 1272w, https://substackcdn.com/image/fetch/$s_!_LbL!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd144a0e7-b98f-4adc-b826-6b187fea5a9d_2048x1366.jpeg 1456w" sizes="100vw" fetchpriority="high" loading="lazy"/></picture></a><figcaption>American fans in an anxious moment during the match between the U.S and Bosnia-Herzegovina at the FIFA Fan Zone in Washington. Photo by Finn Gomez/Getty Images.</figcaption></figure><p>I’m going to admit to feeling a swell of patriotic pride after the U.S. beat Bosnia-Herzegovina 2-0 on Wednesday.<a href="#footnote-1" id="footnote-anchor-1">1</a> Maybe it was a protective reaction after the bullshit red card the referee gave Folarin Balogun. Or maybe it was the juxtaposition of everyone singing along to “Country Roads”<a href="#footnote-2" id="footnote-anchor-2">2</a> in the middle of Silicon Valley, not necessarily considered the most patriotic place in America.<a href="#footnote-3" id="footnote-anchor-3">3</a></p><p>So congratulations to the United States on its 250th birthday, which the country will celebrate tomorrow. It’s really <em>quite</em> an accomplishment if you’ve spent any time studying the rise and decline of empires. And I hope you’ll have a fun and restful July 4 weekend, readers. I very much don’t want to rain on the parade. I’m also <a href="https://www.natesilver.net/p/dont-discount-american-democracys" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">relatively optimistic about the future of the country</a>. I’m a big defender of the complicated national project we’ve undertaken over the past two-and-a-half centuries. I love the United States, and I’m pretty sure I’ll be here for the rest of my life.</p><p>However, an increasing number of Americans don’t agree with me, to a degree that I found frankly surprising. We assigned this story to Eli in our weekly planning meeting, and I expected the data to show that, while American patriotism had declined, it remained relatively high as compared to the rest of the world. Some informative content that was a little on the lighter side, if we’re being frank.</p><p>But that isn’t the case. Compared to most countries, we’re now a little <em>below</em> average in patriotism.</p><p>So I just wanted to let you know where we’re coming from. Our goal here at Silver Bulletin is to evaluate public opinion for what it is, not to reflect our personal views every time we analyze the polls. (And even if we don’t necessarily agree, we understand why an increasing number of Americans feel ambivalent about the United States.) I thought this was a better way to approach the occasion than a hot take from yours truly. <em>–Nate Silver</em></p><p><a href="https://www.natesilver.net/subscribe?" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Subscribe now</a></p><hr/><h4>What the polls say about patriotism</h4><h5>By Eli McKown-Dawson</h5><p>“It was a grand day for the Bicentennial parade in the nation’s capital today, and it was a grand parade celebrating the diversity that is America.” That’s how <a href="https://www.nytimes.com/1976/07/04/archives/500000-view-capitals-bicentennial-parade-500000-watch-capital.html" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">The New York Times described America’s bicentennial celebration</a> in 1976. The parade drew 500,000 people and featured Johnny Cash as the Grand Marshal. Our 200th anniversary also included a<a href="https://en.wikipedia.org/wiki/Operation_Sail#Bicentennial_Program_(1976)" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank"> Grand Parade of Sailing Ships in NYC</a> and a <a href="https://en.wikipedia.org/wiki/United_States_Bicentennial" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">tour of the country</a> by Queen Elizabeth II. When <a href="https://ropercenter.cornell.edu/ipoll/study/31096399/questions#5248415e-df59-4b30-87de-b207db18900f" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Gallup asked Americans in June of that year</a> how much we had “succeeded over these 200 years in achieving the ideals for which this country was founded,” 77 percent answered either a great deal or a fair amount.</p><p>The vibes aren’t anywhere near that good for our semiquincentennial. The Great American State Fair has had problems with <a href="https://www.washingtonpost.com/dc-md-va/2026/06/26/great-american-state-fair-has-bumpy-beginning-its-opening-day/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">power outages</a> and <a href="https://www.cnn.com/2026/07/01/politics/america-250-trump-crowd-fair" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">crowd sizes</a> — and the celebration in general has a decidedly partisan flavor. Many of this year’s events are being <a href="https://freedom250.org/celebration/salute-to-america-celebration-and-fireworks" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">put on by Freedom 250</a>, a Trump-backed public-private partnership.<a href="#footnote-4" id="footnote-anchor-4">4</a> The president also <a href="https://thehill.com/homenews/administration/5950451-july-4th-trump-rally-heat/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">promised to</a> “make a really long speech” before the fireworks begin in DC.</p><p>Being mad about the Great American State Fair is something we’d be tempted to characterize as “very online” behavior. But increasing skepticism about the United States isn’t just an online sentiment. In 2004, <a href="https://news.gallup.com/poll/711938/american-pride-falls-year-record-low.aspx" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Gallup found</a> that 69 percent of U.S. adults were “extremely proud” to be an American. The fourth wave of the <a href="https://www.worldvaluessurvey.org/WVSOnline.jsp" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">World Values Survey</a> (WVS) also ended that year and showed that a similar 71 percent of Americans were “very proud” to be American. Fast forward to 2026, and just 33 percent of adults are extremely proud to be American, according to Gallup, while the latest WVS wave showed an only slightly higher 46 percent in 2022.</p><p>To be fair, as <a href="https://www.nationaljournal.com/s/732244/polarization-destroyed-america-250-even-before-it-became-a-trump-rally/?unlock=0A65SFIVAH0DFCC0" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Natalie Jackson pointed out earlier this week</a>, the Gallup write-up only focused on the “very” or “extremely” proud categories. Some 75 percent of U.S. adults are at least “moderately” proud to be American, <a href="https://news.gallup.com/poll/711938/american-pride-falls-year-record-low.aspx" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">according to its data</a>, a figure in line with other polls from <a href="https://yougov.com/en-us/articles/55054-half-of-republicans-and-11-of-democrats-define-patriotism-as-supporting-their-country-unconditionally" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">YouGov</a> and <a href="https://www.foxnews.com/politics/fox-news-poll-looking-ahead-americas-250th-anniversary" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Fox News</a>. Anti-American sentiment isn’t likely to be a winning argument, even in Democratic primaries, let alone in general elections.</p><h4>How American pride compares to the rest of the world</h4><p>Still, there has been a real decline in patriotism that I don’t think we should discount. Historically, American pride was somewhat exceptional when compared to other countries, so much so that the American tourist who slaps an American flag on everything is a <a href="https://www.businessinsider.com/biggest-misconceptions-stereotypes-americans-tourists-2019-4" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">common trope</a>. Have smaller countries — particularly those in Latin America, the Middle East, and parts of Asia — always topped the patriotism charts? Absolutely. <a href="http://venezuela" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">In the latest WVS wave</a>, 97 percent of Jordanians were “very proud” or “quite proud” of their nationality, while 92 percent of Venezuelans and Colombians felt the same.</p><p>But we used to hang with that crowd. In the first WVS wave, concluded in 1984, 95 percent of Americans were very or quite proud of their nationality. That figure was higher than the average share in Latin America (83 percent) and much higher than the European average of 77 percent. Throughout the late 20th century, the U.S. was a patriotic outlier compared to other large developed nations and our peers in Western Europe. Just 19 percent of Germans and 32 percent of French people were very proud of their nationality in the 1993 WVS wave, compared to 74 percent of Americans.</p><p>Fast forward to 2022, and “just” 78 percent of Americans were very proud or quite proud of their nationality; that’s a 17-point drop since the 1980s and lower than the 2022 European average of 81 percent. People in Asia, Latin America, Africa, and the Middle East are hovering closer to 90 percent pride, on average. While other regions’ national pride has held steady or increased, ours has fallen.<a href="#footnote-5" id="footnote-anchor-5">5</a></p><p><a href="https://www.natesilver.net/p/america-used-to-be-exceptionally?action=share" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Share</a></p><p>It isn’t just the smaller countries either, which arguably have more national cohesion. Let’s pare down the WVS dataset to countries that have populations of at least 100 million or that are <a href="https://www.oecd.org/en/about/members-partners.html" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">OECD members</a>. We’ll create a “pride-o-meter” score for each country from 0 to 100 based on the four categories of responses.</p><p>You have to scroll down to the third page to find the United States. We’re 34th out of 45 qualifying countries. Americans are now no more proud of their country than Brits.<a href="#footnote-6" id="footnote-anchor-6">6</a></p><h4>Yes, patriotism is becoming more partisan</h4><p>That decline in pride has happened across the board, but it’s been most pronounced among Democrats, particularly since Trump entered the political scene. To level-set, majorities of Republicans (96 percent), independents (59 percent), and Democrats (58 percent) are still proud to be Americans, <a href="https://yougov.com/en-us/articles/55054-half-of-republicans-and-11-of-democrats-define-patriotism-as-supporting-their-country-unconditionally" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">according to YouGov</a>. But when it comes to more intensive national pride, Democrats are nowhere near where they used to be.</p><p>During George W. Bush’s second term, an average of 58 percent of Democrats were <em>extremely</em> proud to be American <a href="https://news.gallup.com/poll/711938/american-pride-falls-year-record-low.aspx" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">according to Gallup</a>, as was an identical share of independents — though Republicans were higher. The rough parity between Democrats and independents lasted through Barack Obama’s second term, but the share of <em>extremely</em> proud Democrats fell to an average of 30 percent during Trump’s first term and was just 14 percent in the most recent Gallup poll.</p><p>Although Republicans are generally more patriotic, their opinions can shift based on who occupies 1600 Pennsylvania Avenue too. The share of Republicans extremely proud to be American fell from 79 percent on average during Bush’s second term to 60 percent during Biden’s term. What happened after Trump retook office? It jumped right back up to 74 percent.</p><p>But did Democrats’ numbers bounce back under President Biden after Trump’s first term? Nope. They held steady at 30 percent. Some of this is probably attributable to changing attitudes about the nation’s founding and subsequent history <a href="https://www.nationaljournal.com/s/732244/polarization-destroyed-america-250-even-before-it-became-a-trump-rally/?unlock=0A65SFIVAH0DFCC0" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">that accompanied the Black Lives Matter movement</a>.</p><p>Still, Trump seems to be the bigger story here, and perhaps even caused a permanent shift in attitudes. Echelon Insights recently <a href="https://x.com/EchelonInsights/status/2071954438067995092" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">polled Americans about “conditional patriotism”</a> and found that 49 percent of Democrats agreed with the statement “how patriotic I feel depends on who is in power and current government policies.” The figure for Republicans was 18 percent.</p><p>Perhaps it’s rational that our pride advantage over other nations has evaporated. We’re still the world’s largest economy, but we’re not as <a href="https://www.economist.com/interactive/united-states/2026/07/01/america-is-mighty-but-becoming-less-dominant" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">clearly dominant across the board as we were in the ‘80s and ‘90s</a>. The growth in American life expectancy <a href="https://www.nytimes.com/2016/12/08/health/life-expectancy-us-declines.html" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">has stagnated</a>. And the U.S. is <a href="https://ourworldindata.org/grapher/democracy-index-eiu" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">no longer as democratic as it once was</a>, according to various democracy indices, even if we’d <a href="https://www.natesilver.net/p/dont-discount-american-democracys" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">debate the notion</a> that the country has passed some tipping point.</p><p>Still, a shared belief in the American project once served as a hedge against the “alternate domination of one faction over another, sharpened by the spirit of revenge,” as <a href="https://constitutioncenter.org/the-constitution/historic-document-library/detail/george-washington-farewell-address-1796" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Washington put it</a>. These days, even the joint gold medals by the U.S. men’s and women’s hockey teams at the Milan Olympics <a href="https://sports.yahoo.com/articles/fans-disgusted-u-hockey-star-143811895.html" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">devolved into some indecipherable partisan argument</a>.</p><p>Maybe if we win the World Cup? It’s <a href="https://www.natesilver.net/p/world-cup-2026-odds-predictions" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">not likely</a>, granted. But at this point, a return to America being a profoundly patriotic country is probably a long shot too.</p><p>Silver Bulletin is a reader-supported publication. To receive new posts and support our work, consider becoming a subscriber.</p><a href="#footnote-anchor-1" id="footnote-1">1</a><p>I was lucky enough to attend the match. I had a meeting in Silicon Valley the next day. You think I <em>wasn’t</em> going to go?</p><a href="#footnote-anchor-2" id="footnote-2">2</a><p>More formally, “Take Me Home, Country Roads.” It’s a great song, and although it might seem conservative-coded, John Denver was <a href="https://www.latimes.com/archives/la-xpm-1987-09-11-ca-4594-story.html" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">very much a lib</a>.</p><a href="#footnote-anchor-3" id="footnote-3">3</a><p>But maybe that’s the wrong conception. Silicon Valley is still the American frontier in many ways, and it attracts a lot of immigrants from all around the world. And <em>frontier spirit</em> is a very American characteristic.</p><a href="#footnote-anchor-4" id="footnote-4">4</a><p>To be clear, I’m not bashing Freedom 250. In fact, I’m morbidly excited about their <a href="https://www.forbes.com/sites/antoniopequenoiv/2026/06/27/high-schoolers-will-compete-for-125000-scholarship-in-trumps-patriot-games-what-we-know/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Patriot Games</a>, an athletic competition between one male and one female high school student from each state that you have to imagine was dreamed up by a huge Hunger Games fan.</p><a href="#footnote-anchor-5" id="footnote-5">5</a><p>The WVS also shows a drop in Canadian pride, albeit a smaller one, between 1984 and 2022. But <a href="https://www.politico.com/news/2026/07/01/poll-canadian-patriotism-rises-europe-00982419" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">more recent polls</a> show that trend reversing now that Trump is back in office.</p><a href="#footnote-anchor-6" id="footnote-6">6</a><p>Although we still have <a href="https://www.natesilver.net/p/i-loved-my-time-in-the-uk-but-it" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">bipartisan national pride over air conditioning</a>.</p><p></p>'''
