title = 'Hackers can use 9 of the most popular AI tools to assemble massive botnets'
body = '''
<p>In the brief history of AI security, the prompt injection has quickly become the top threat. Large language models are inherently unable to distinguish between legitimate instructions provided by users and malicious ones sneaked into emails, source code, and other third-party content the models are processing. This makes it trivial to surreptitiously inject malicious commands that the LLM readily follows.</p>
<p>With no way to enforce this crucial boundary between trusted and untrusted sources, AI engine developers are left to erect elaborate guardrails designed to mitigate the damage rather than solve the root cause.</p>
<p>To date, most prompt injections have fallen into a class known as push, in which each potential victim is targeted. For example, the adversary injects malicious instructions into an individual email or calendar invitation. Because the injection must then be sent (or pushed) to each specific target, the scale of the attack is limited, hampering mass exploits that hit the Internet at large.</p>
<p>Meanwhile, pull-based attacks, in which an LLM actively seeks out the adversarial prompts planted on websites, remain limited. With no way to lure large numbers of LLMs to a malicious site, these sorts of attacks don’t scale either.</p>
<h2>Enter HalluSquatting</h2>
<p>Now, researchers have devised a pull-based attack that changes all that. A new attack the researchers have named HalluSquatting has the potential to assemble massive botnets, perform large-scale DDoSes, and infect devices at scale, a first for prompt-injection attacks. The attack works against AI coding assistants and agents, including Cursor, Cursor CLI, Gemini CLI, Windsurf, GitHub Copilot, Cline, OpenClaw, ZeroClaw, and NanoClaw, which are all susceptible. In the normal course of performing day-to-day activities, these assistants and agents routinely pull code and other resources from repositories and registries.</p>
<img width="640" height="281" src="https://cdn.arstechnica.net/wp-content/uploads/2026/07/hallusquatting-threat-model-640x281.png" alt="" decoding="async" srcset="https://cdn.arstechnica.net/wp-content/uploads/2026/07/hallusquatting-threat-model-640x281.png 640w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/hallusquatting-threat-model-1024x449.png 1024w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/hallusquatting-threat-model-768x337.png 768w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/hallusquatting-threat-model-980x430.png 980w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/hallusquatting-threat-model.png 1280w" sizes="auto, (max-width: 640px) 100vw, 640px" loading="lazy"/>
      The HalluSquatting threat model.
        Credit:
          Spira et al.

<p>Short for adversarial hallucination squatting, HalluSquatting is built on an LLM’s inherent tendency to hallucinate the resource identifiers hosted in repositories and registries. It works against coding agents and assistants, which commonly access high-privilege command lines to run code from third-party resources. By predicting the identifiers LLMs are most likely to hallucinate and then registering and seeding them with instructions to install reverse shells or other malicious wares, the attack can indiscriminately infect massive numbers of devices without having to target each one.</p>
<p>“The scalable property of the attack enables the attacker to compromise a large number of users with minimal effort by targeting popular resources, thereby maximizing the likelihood that the squatted resource will be retrieved,” the researchers wrote in a paper published Wednesday. “By exploiting integrated shells and terminals of agentic applications to run scripts and code, attackers can effectively ‘infect’ many independent agentic applications by embedding instructions to install reverse shells in the resources the attackers register.”</p>
<p>With the ability to take control of distributed devices at scale, HalluSquatting has the potential to achieve various objectives not previously possible with prompt injections. Large ransomware campaigns and large botnets for use in DDoSes or cryptocurrency mining are two such examples.</p>
<p>The “squatting” part of the name is an invocation of “typosquatting,” in which a domain, repository package, or other resource identifier closely mimics the name of a popular one in hopes of luring potential users to visit or install it. Typosquatting first gained widespread attention in 2016 when a college student <a href="https://arstechnica.com/information-technology/2016/06/college-student-schools-govs-and-mils-on-perils-of-arbitrary-code-execution/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">uploaded 214 booby-trapped packages</a> to the PyPI, RubyGems, and NPM repositories that closely mimicked names of legitimate packages. The result: The imposter code was executed more than 45,000 times on more than 17,000 separate domains, and more than half were given all-powerful administrative rights. Typosquatting attacks <a href="https://arstechnica.com/information-technology/2021/12/malicious-packages-sneaked-into-npm-repository-stole-discord-tokens/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">have</a> <a href="https://arstechnica.com/information-technology/2020/04/725-bitcoin-stealing-apps-snuck-into-ruby-repository/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">flourished</a> <a href="https://arstechnica.com/gadgets/2021/07/malicious-pypi-packages-caught-stealing-developer-data-and-injecting-code/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">ever</a> <a href="https://arstechnica.com/gadgets/2021/06/counterfeit-pypi-packages-with-5000-downloads-installed-cryptominers/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">since</a>.</p>
<p></p>
<h2>LLMs don’t know how to say “I don’t know.”</h2>
<p>The starting point for HalluSquatting is the inability of LLMs to accurately identify the location of a resource specified by the user. When a developer, for instance, instructs a coding agent to clone a popular new repository, the LLM hallucinates its correct location up to 85 percent of the time. When cloning a trending “<a href="https://agentskills.io/home" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">skill</a>,” a form of instruction, script, or resource that gives agents specialized capabilities and domain expertise, hallucinations can occur 100 percent of the time. HalluSquatting focuses on trending resources because they aren’t included in the LLM training. They also receive large numbers of downloads over a short period of time.</p>
<p>The researchers say the inability of LLMs to provide the correct location is an inherent flaw that arises from training biases or from misinterpretations of instructions within the current context. That means when a user prompts the coding assistant to clone a repository or skill—in the form of, say, “clone repo name” or “install skill name”—the bot frequently navigates to the wrong location to retrieve it.</p>
<p>Not only are these hallucinations inevitable, but they also occur at the foundational level of all six of the major LLMs, including Gemini-2.5-flash, Gemini-2.5-pro, GPT-5.1, GPT-5.2, Sonnet-4.5, and Opus-4.5. Additionally, the most commonly provided incorrect locations that these LLMs hallucinate are easy to predict in advance. All six LLMs follow common patterns when resolving the repository or skill name in a prompt with its official name in a repository or skill repository.</p>
<p>LLMs follow various hallucination patterns. The one HalluSquatting exploits is described as being self-referential. All six models produce repo-name/repo-name slugs that treat a repository name as the owner. Exploiting the pattern requires no model probing.</p>
<img width="3592" height="752" src="https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates.jpg" alt="Table contents from PDF: Target repository gemini-2.5-flash gpt-5.2 sonnet-4.5 opus-4.5 vibe-kanban ⋆ vibe-kanban /vibe-kanban (35%) ⋆ vibe-kanban /vibe-kanban (100%) thesephist /vibe-kanban (72%) anthropics /vibe-kanban (100%) ui-tars-desktop tars-project /ui-tars-desktop (21%) bytedance /ui-tars-desktop (98%) reworkd /ui-tars-desktop (90%) bytedance /ui-tars-desktop (100%) pageindex johndoe /pageindex (10%) ⋆ pageindex /pageindex (79%) ⋆ pageindex /pageindex (33%) anthropics /pageindex (96%) oh-my-opencode opencode-project /oh-my-opencode (33%) ⋆ oh-my-opencode /oh-my-opencode (59%) opencodeco /oh-my-opencode (20%) ohmyzsh /ohmyzsh (98%) antigravity-manager ⋆ antigravity-manager /antigravity-manager (26%) ⋆ antigravity-manager /antigravity-manager (82%) username /antigravity-manager (50%) anthropics /antigravity-manager (80%) Archon archonproject /archon (13%) archoncloud /archon (38%) archon-linux /archon (29%) coleam00 /archon (100%) DeepTutor microsoft /deeptutor (9%) ⋆ deeptutor /deeptutor (98%) ⋆ deeptutor /deeptutor (17%) ruc-nlpir /deeptutor (96%) Kronos kronos-io /kronos (10%) kronos-integration /kronos (47%) facebookresearch /kronos (13%) hax4us /kronos (18%) claudian someuser /claudian (17%) ⋆ claudian /claudian (98%) anthropics /anthropic-sdk-python (54%) anthropics /claudian (30%) VoxCPM ⋆ voxcpm /voxcpm (25%) openbmb /voxcpm (45%) openbmb /voxcpm (35%) openbmb /voxcpm (77%)" decoding="async" srcset="https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates.jpg 3592w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-640x134.jpg 640w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-1024x214.jpg 1024w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-768x161.jpg 768w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-1536x322.jpg 1536w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-2048x429.jpg 2048w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-980x205.jpg 980w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/most-frequent-hallucinated-owner-repo-candidates-1440x301.jpg 1440w" sizes="auto, (max-width: 3592px) 100vw, 3592px" loading="lazy"/>
