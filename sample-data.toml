body = '''
<p>Ivy League college students are, by definition, intelligent. They don’t <em>need</em> to use generative AI to cheat on exams; they could just learn the material. But they also tend to be competitive, ambitious, and overscheduled, so AI can look like an easy shortcut that makes more time in their lives for things that can’t be done by a chatbot. When the pressure is on, which approach do they choose?</p><p>A new scandal at Brown University reveals that huge numbers of these students are likely to cheat.</p><h2>Record scores</h2><p>A <a href="https://arstechnica.com/tech-policy/2026/05/ai-driven-cheating-widespread-even-at-elite-schools-like-princeton/" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">recent survey of Princeton students</a> found that 29.9 percent admitted to cheating with AI on at least one exam or assignment. But the recent situation at Brown gives us a better sense of what this kind of cheating looks like in one particular class—and just how much it may be substituting for actual learning. And we know all this because the blind economics professor at the center of it all, Roberto Serrano, is not letting it go.</p><p>In just the last week, Serrano—who was born in Spain—has told his story to <a href="https://english.elpais.com/education/2026-06-28/ai-fraud-at-brown-university-academic-integrity-is-at-risk.html" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">El País</a> and <a href="https://www.insidehighered.com/news/faculty/learning-assessment/2026/07/08/brown-professor-suspects-most-his-class-used-ai-cheat" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">Inside Higher Ed</a>, which have both run significant pieces on the scandal.</p><p>The story that Serrano told them begins in December 2025, when a <a href="https://en.wikipedia.org/wiki/2025_Brown_University_shooting" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">gunman attacked Brown’s campus</a> and killed two people, including one who had recently introduced herself to Serrano.</p><figure><a href="https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1.jpg" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank"><img width="1024" height="683" src="https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-1024x683.jpg" alt="" decoding="async" srcset="https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-1024x683.jpg 1024w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-640x427.jpg 640w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-768x512.jpg 768w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-1536x1024.jpg 1536w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-2048x1366.jpg 2048w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-980x654.jpg 980w, https://cdn.arstechnica.net/wp-content/uploads/2026/07/GettyImages-2205591124-1-1440x960.jpg 1440w" sizes="auto, (max-width: 1024px) 100vw, 1024px" loading="lazy"/></a>Roberto Serrano receiving an award from the King of Spain in 2025.Credit:
Getty Images<figcaption>Roberto Serrano receiving an award from the King of Spain in 2025.
Credit:
Getty Images</figcaption></figure><p>Shaken by the experience, Serrano decided that his spring 2026 section of the quite difficult ECON 1170 would allow take-home exams for both the midterm and the final. Suddenly, the course received an influx of students. El País has the story:</p><blockquote><p>The course… typically attracts few students, but very good ones. [Serrano] has never had more than 30 students enrolled at a time, and on some occasions he had only eight. This semester, probably because of the new evaluation system, 86 students signed up for the class. The results of the midterm exam, which was administered on March 5, were extraordinary, with an average score of 96 out of 100. Forty students scored a perfect 100.</p></blockquote><p>This was indeed extraordinary, because as Serrano told Inside Higher Ed, “Historically the average grade in the midterm of this course has ranged between 65 and 80 [percent], and this exam was harder than the exams I wrote in the past, because… take-home is an opportunity to challenge the class a little bit more, given that you’re giving the students unlimited time.”</p><p>Beyond the numbers, many of the answers, even when correct, felt slightly off. They had a “very convoluted style,” Serrano said. When he and his grad students ran the exam questions through ChatGPT, they received similar results.</p><p>A suspicious Serrano decided that he would make the final exam in-person; he would see if students did similarly well on it. He emailed his class, telling them, “I am not declaring [the midterm] void for now. I am going to give the class a chance to prove me wrong. That is, if the distribution of the final exam is roughly similar to the distribution of the midterm, I will count the midterm. Otherwise, which is of course what I expect to happen, I will declare the midterm void and reweigh the final accordingly.”</p><p>Eighteen students suddenly dropped the course, while nine others didn’t even attend the final exam. Of those 27 students, El País noted, “22 had scored a perfect 100 in the midterm exam.”</p><p>Among those who took the test, the average score plunged—from 96 all the way down to 48.</p><h2>A failed society?</h2><p>The professor was horrified by what appeared to be massive cheating in his course—cheating that was preventing most of the students from learning the material.</p><p>Serrano comes across as someone with no inclination to coddle elite students. His attitude may be traceable in part to his own childhood, in which he went blind from retinal dystrophy at age 17 and had to make a choice about what the rest of his life would look like. From El País:</p><blockquote><p>After a short-lived crisis, he decided [blindness] would not stop him. He learned Braille, and his excellent academic record opened up the doors of Harvard. “Of course it affects my life, but one shouldn’t over-dramatize. We economists understand reality as a set of people responding to optimization problems with restrictions. I view my disease simply as one more restriction that I have to deal with, and I optimize based on that,” he says.</p></blockquote><p>As a university, Brown is grappling with hard questions about AI use at the moment. It recently released a <a href="https://provost.brown.edu/sites/default/files/GAITL_Committee_Report_FNL.pdf" referrerpolicy="no-referrer" rel="noopener noreferrer" target="_blank">provost-led report</a> (PDF) on “Generative AI in Teaching and Learning,” which found that it’s not just professors who have concerns.</p><p>Even though “56 percent of undergraduate respondents [at Brown] and 67 percent of graduate and medical student respondents reported intentionally using GenAI tools daily or weekly,” the report notes that large majorities of students also have “concerns about the impact of GenAI use on their learning” and a “fear of negative consequences for their cognitive capacity.”</p><p>Serrano shares those concerns, and he wants universities as a whole to stand up for human thought. That’s why he’s not letting this story go, despite what he contends is a fairly tepid reaction from Brown administrators.</p><p>“We cannot afford to have a society in which a significant fraction of our best young minds think that cheating is okay,” he told Inside Higher Ed. “That leads to a declining society, to a failed society.</p><p>“We cannot choose to become idiots.”</p>'''
