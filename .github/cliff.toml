# git-cliff configuration — generates release notes from Conventional Commits.
# Notes are attached to GitHub Releases by .github/workflows/release.yml; the
# changelog is not committed back to the repo.

[changelog]
# Rendered per release. `header` is stripped in CI (--strip header) so only the
# body lands in the GitHub Release.
header = "# Changelog\n\n"
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }}{% if timestamp %} — {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Group by commit type; drop noise. Unmatched conventional types fall through.
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^ci", skip = true },
  { message = "^build", group = "Build" },
  { body = ".*security", group = "Security" },
]
# Keep releases focused: skip anything tagged as a release-candidate/beta.
skip_tags = "v.*-(alpha|beta|rc).*"
tag_pattern = "v[0-9].*"
filter_commits = false
sort_commits = "oldest"
